name: Load Tests (Smoke)

on:
  schedule:
    - cron: '0 4 * * *'   # Daily at 4am UTC
  workflow_dispatch:
    inputs:
      users:
        description: 'Number of concurrent users'
        required: false
        default: '10'
      duration:
        description: 'Test duration (e.g. 30s, 2m)'
        required: false
        default: '30s'
      host:
        description: 'Target host (default: http://localhost:8000)'
        required: false
        default: 'http://localhost:8000'

jobs:
  smoke-test:
    name: Locust Smoke Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bomipay
          POSTGRES_USER: bomipay
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://bomipay:changeme@localhost:5432/bomipay
      SECRET_KEY: ci-load-test-secret-key
      REDIS_URL: redis://localhost:6379/0
      PROVIDER_ENCRYPTION_KEY: ci-load-test-encryption-key-12345
      PAYSTACK_WEBHOOK_SECRET: ci-load-test-webhook-secret
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" locust

      - name: Run database migrations
        run: alembic upgrade head

      - name: Start API server
        run: |
          uvicorn bomipay.main:app --host 0.0.0.0 --port 8000 &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait until the health endpoint is responsive
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null; then
              echo "API server is ready."
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 2
          done

      - name: Create load-test user
        run: |
          curl -sf -X POST http://localhost:8000/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{
              "full_name": "Load Test User",
              "email": "load_test@example.com",
              "password": "LoadTest123!",
              "phone": "+2348000000099",
              "merchant_name": "Load Test Merchant",
              "business_type": "retail",
              "country": "NG"
            }' || echo "User may already exist."

      - name: Run Locust smoke test
        run: |
          USERS="${{ github.event.inputs.users || '10' }}"
          DURATION="${{ github.event.inputs.duration || '30s' }}"
          HOST="${{ github.event.inputs.host || 'http://localhost:8000' }}"

          locust -f tests/test_load_locust.py \
            --headless \
            -u "$USERS" \
            -r 2 \
            --run-time "$DURATION" \
            --host "$HOST" \
            --html load-test-report.html \
            --csv load-test-stats \
            --only-summary

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report-${{ github.run_number }}
          path: |
            load-test-report.html
            load-test-stats*.csv
          retention-days: 30

  performance-tests:
    name: pytest Performance Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite+aiosqlite:///./perf_test.db
      SECRET_KEY: ci-perf-test-key
      REDIS_URL: redis://localhost:6379/0
      PROVIDER_ENCRYPTION_KEY: ci-perf-test-encryption-key-12345
      PAYSTACK_WEBHOOK_SECRET: ci-perf-test-webhook-secret
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run performance tests
        run: |
          python -m pytest tests/test_performance_endpoints.py \
            -v -m performance \
            --tb=short \
            --timeout=60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-test-results-${{ github.run_number }}
          path: .pytest_cache/
          retention-days: 7
