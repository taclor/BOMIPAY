services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bomipay:changeme@db:5432/bomipay
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bomipay
      POSTGRES_USER: bomipay
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"
    volumes:
      - bomipay_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomipay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A src.bomipay.worker worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - BOMIPAY_ENV=development
      - DATABASE_URL=postgresql+asyncpg://bomipay:changeme@db:5432/bomipay
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A src.bomipay.worker beat --loglevel=info
    env_file:
      - .env
    environment:
      - BOMIPAY_ENV=development
      - DATABASE_URL=postgresql+asyncpg://bomipay:changeme@db:5432/bomipay
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - worker
    restart: unless-stopped

volumes:
  bomipay_data:
