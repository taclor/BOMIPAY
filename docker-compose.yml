version: "3.9"
services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bomipay
      POSTGRES_USER: bomipay
      POSTGRES_PASSWORD: changeme
    volumes:
      - bomipay_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomipay"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
  worker:
    build: .
    command: celery -A src.bomipay.worker app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - BOMIPAY_ENV=development
      - DATABASE_URL=postgresql://bomipay:changeme@db:5432/bomipay
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
  beat:
    build: .
    command: celery -A src.bomipay.worker app beat --loglevel=info
    env_file:
      - .env
    environment:
      - BOMIPAY_ENV=development
      - DATABASE_URL=postgresql://bomipay:changeme@db:5432/bomipay
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - worker
    restart: unless-stopped
volumes:
  bomipay_data:
