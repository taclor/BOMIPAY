worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;

    # Hide nginx version
    server_tokens off;

    # Security: disable HTTP/1.0
    # (supports only HTTP/1.1 and HTTP/2)

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # Upstream API service
    upstream api {
        server api:8080;
        keepalive 32;
    }

    # Redirect HTTP to HTTPS in production (commented for now, requires SSL setup)
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Block access to sensitive paths
        location ~ /\. {
            deny all;
            return 403;
        }

        # Do not expose Prometheus metrics publicly
        location /metrics {
            deny all;
            return 403;
        }

        # Rate limiting for auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=2 nodelay;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Default location with rate limiting
        location / {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 100m;
        }

        # Health probe — exposed publicly for load-balancer checks
        location /api/v1/health {
            access_log off;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # HTTPS server for production (uncomment and configure when SSL certs are available)
    server {
        listen 443 ssl http2;
        server_name bomipay.ng dashboard.bomipay.ng api.bomipay.ng;

        # SSL certificates (mount from Let's Encrypt or Docker volume)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        
        # SSL configuration
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # HSTS header
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Prevent exposing sensitive endpoints
        location /metrics {
            deny all;
            return 403;
        }

        # Rate limiting for auth endpoints
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=2 nodelay;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Default location with rate limiting
        location / {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 100m;
        }

        # Health probe
        location /api/v1/health {
            access_log off;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
